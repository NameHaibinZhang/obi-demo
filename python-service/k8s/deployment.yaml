apiVersion: v1
kind: ConfigMap
metadata:
  name: python-service-config
  namespace: obi-demo
data:
  MYSQL_HOST: "mysql"
  MYSQL_USER: "root"
  MYSQL_PASSWORD: "demo123"
  MYSQL_DB: "obidemo"
  NEXT_SERVICE_URL: "http://go-service:8084"
  AI_SERVICE_URL: "http://python-ai-service:8087"
  PHP_SERVICE_URL: "http://php-service:8083"
  INVALID_HOST: "http://nonexistent-service:9999"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-service
  namespace: obi-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-service
  template:
    metadata:
      labels:
        app: python-service
    spec:
      containers:
      - name: python-service
        image: registry.cn-hangzhou.aliyuncs.com/private-mesh/obi:python-service
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: python-service-config
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: python-service
  namespace: obi-demo
spec:
  selector:
    app: python-service
  ports:
  - port: 8081
    targetPort: 8081