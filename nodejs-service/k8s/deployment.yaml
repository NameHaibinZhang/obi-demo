apiVersion: v1
kind: ConfigMap
metadata:
  name: nodejs-service-config
  namespace: obi-demo
data:
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/obidemo"
  NEXT_SERVICE_URL: "http://go-service:8084"
  GO_GRPC_ADDR: "go-service:9084"
  GO_HTTP_ADDR: "http://go-service:8084"
  DOTNET_HTTP_ADDR: "http://dotnet-service:8085"
  INVALID_HOST: "http://nonexistent-service:9999"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-service
  namespace: obi-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodejs-service
  template:
    metadata:
      labels:
        app: nodejs-service
    spec:
      containers:
      - name: nodejs-service
        image: obi-demo/nodejs-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        envFrom:
        - configMapRef:
            name: nodejs-service-config
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: nodejs-service
  namespace: obi-demo
spec:
  selector:
    app: nodejs-service
  ports:
  - port: 8082
    targetPort: 8082