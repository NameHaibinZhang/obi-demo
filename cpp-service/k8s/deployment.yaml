apiVersion: v1
kind: ConfigMap
metadata:
  name: cpp-service-config
  namespace: obi-demo
data:
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  PHP_SERVICE_URL: "http://php-service:8083"
  INVALID_HOST: "http://nonexistent-service:9999"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpp-service
  namespace: obi-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cpp-service
  template:
    metadata:
      labels:
        app: cpp-service
    spec:
      containers:
      - name: cpp-service
        image: obi-demo/cpp-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
        envFrom:
        - configMapRef:
            name: cpp-service-config
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: cpp-service
  namespace: obi-demo
spec:
  selector:
    app: cpp-service
  ports:
  - port: 8086
    targetPort: 8086