apiVersion: v1
kind: ConfigMap
metadata:
  name: go-service-config
  namespace: obi-demo
data:
  MYSQL_DSN: "root:demo123@tcp(mysql:3306)/obidemo"
  REDIS_ADDR: "redis:6379"
  DOTNET_GRPC_ADDR: "dotnet-service:8085"
  DOTNET_HTTP_ADDR: "http://dotnet-service:8085"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-service
  namespace: obi-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-service
  template:
    metadata:
      labels:
        app: go-service
    spec:
      containers:
      - name: go-service
        image: registry.cn-hangzhou.aliyuncs.com/private-mesh/obi:go-service
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8084
          name: http
        - containerPort: 9084
          name: grpc
        envFrom:
        - configMapRef:
            name: go-service-config
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: go-service
  namespace: obi-demo
spec:
  selector:
    app: go-service
  ports:
  - name: http
    port: 8084
    targetPort: 8084
  - name: grpc
    port: 9084
    targetPort: 9084