apiVersion: v1
kind: ConfigMap
metadata:
  name: rust-service-config
  namespace: obi-demo
data:
  NODEJS_SERVICE_URL: "http://nodejs-service:8082"
  INVALID_HOST: "http://nonexistent-service:9999"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-service
  namespace: obi-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust-service
  template:
    metadata:
      labels:
        app: rust-service
    spec:
      containers:
      - name: rust-service
        image: registry.cn-hangzhou.aliyuncs.com/private-mesh/obi:rust-service
        imagePullPolicy: Always
        ports:
        - containerPort: 8088
        envFrom:
        - configMapRef:
            name: rust-service-config
        resources:
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: rust-service
  namespace: obi-demo
spec:
  selector:
    app: rust-service
  ports:
  - port: 8088
    targetPort: 8088
